name: Auto Video Generation

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies and yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy moviepy pillow requests
        sudo apt-get update && sudo apt-get install -y ffmpeg
        pip install yt-dlp

    - name: Parse Issue Inputs and Download Files
      id: parse_args
      run: |
        BODY='${{ github.event.issue.body }}'
        
        # 1. CSVのURLを最優先で抽出 (GitHubのassetsにある.csvリンクを正確に抜く)
        CSV_URL=$(echo "$BODY" | grep -oE 'https://github.com/[^)]+\.csv' | head -n 1)
        
        # 2. 動画のURLを抽出 (YouTubeリンク、またはGitHubのmp4リンク)
        VIDEO_URL=""
        if echo "$BODY" | grep -qE '(youtube\.com|youtu\.be)'; then
          VIDEO_URL=$(echo "$BODY" | grep -oE 'https://(www\.)?(youtube\.com|youtu\.be)/[^ \n)]+' | head -n 1)
        else
          VIDEO_URL=$(echo "$BODY" | grep -oE 'https://github.com/[^)]+\.(mp4|mov|avi)' | head -n 1)
        fi
        
        # 3. 秒数を抽出 (コロンや文字を排除して純粋な数字・少数だけを抜き出す)
        PITCH_TIME=$(echo "$BODY" | grep -A 1 '初球の秒数' | tail -n 1 | grep -oE '[0-9]+(\.[0-9]+)?' | head -n 1)

        # デバッグ用に抽出結果をログに出す
        echo "=== 抽出結果 ==="
        echo "VIDEO: $VIDEO_URL"
        echo "CSV: $CSV_URL"
        echo "TIME: $PITCH_TIME"
        echo "==============="

        if [ -z "$PITCH_TIME" ]; then
          PITCH_TIME="50.0" # 万が一空っぽなら50秒をデフォルトにする
        fi
        echo "PITCH_TIME=$PITCH_TIME" >> $GITHUB_ENV

        # CSVのダウンロード
        curl -L -o rapsodo_data.csv "$CSV_URL"

        # 動画のダウンロード
        if [[ "$VIDEO_URL" == *"youtube.com"* || "$VIDEO_URL" == *"youtu.be"* ]]; then
          echo "YouTubeから動画をダウンロードしています..."
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "$VIDEO_URL" -o "input_video.mp4" --merge-output-format mp4
        else
          echo "GitHubから動画をダウンロードしています..."
          curl -L -o input_video.mp4 "$VIDEO_URL"
        fi

    - name: Run Python Script
      run: |
        python auto_cutter.py --video "input_video.mp4" --csv "rapsodo_data.csv" --time "$PITCH_TIME"

    - name: Upload Finished Video
      uses: actions/upload-artifact@v4
      with:
        name: finished-pitching-video
        path: highlight_output.mp4
