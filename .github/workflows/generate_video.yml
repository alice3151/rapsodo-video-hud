name: Auto Video Generation

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies and yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy moviepy pillow requests
        sudo apt-get update && sudo apt-get install -y ffmpeg
        pip install yt-dlp

    - name: Force Download Files
      run: |
        # YouTubeの動画URLをここに貼り付けてください
        VIDEO_URL="https://www.youtube.com/watch?v=xxxxxxx"
        
        CSV_URL="https://github.com/alice3151/rapsodo-video-hud/user-attachments/files/29784548/1.BT.Rapsodo.-.csv"
        PITCH_TIME="50.0"

        echo "PITCH_TIME=$PITCH_TIME" >> $GITHUB_ENV

        echo "CSVデータをダウンロード中..."
        curl -L -o rapsodo_data.csv "$CSV_URL"

        echo "YouTubeから動画をダウンロード中..."
        yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "$VIDEO_URL" -o "input_video.mp4" --merge-output-format mp4

    - name: Run Python Script
      run: |
        python auto_cutter.py --video "input_video.mp4" --csv "rapsodo_data.csv" --time "$PITCH_TIME"

    - name: Upload Finished Video
      uses: actions/upload-artifact@v4
      with:
        name: finished-pitching-video
        path: highlight_output.mp4
