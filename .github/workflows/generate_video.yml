name: Auto Video Generation

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies and yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy moviepy pillow requests
        sudo apt-get update && sudo apt-get install -y ffmpeg
        pip install yt-dlp

    - name: Parse Issue Inputs and Download Files
      id: parse_args
      env:
        ISSUE_BODY: ${{ github.event.issue.body }}
      run: |
        # 1. 入力された文章から、邪魔な隠れリンク形式などをきれいに掃除します
        CLEAN_BODY=$(echo "$ISSUE_BODY" | sed -E 's/\[([^]]*)\]\(([^)]*)\)/\2/g' | sed 's/投球の秒数/初球の秒数/g')

        # 2. CSVのURLを正確に抽出
        CSV_URL=$(echo "$CLEAN_BODY" | grep -oE 'https://github.com/[^ \n\r)]+\.csv' | head -n 1)
        
        # 3. 動画のURLを正確に抽出（csvを除外）
        VIDEO_URL=$(echo "$CLEAN_BODY" | grep -oE 'https?://[^ \n\r)]+' | grep -v '\.csv' | head -n 1)
        
        # 4. 秒数を正確に抽出
        PITCH_TIME=$(echo "$CLEAN_BODY" | grep -A 1 '初球の秒数' | tail -n 1 | grep -oE '[0-9]+(\.[0-9]+)?' | head -n 1)

        echo "=== 読み込みチェック（完全自動版） ==="
        echo "VIDEO: [$VIDEO_URL]"
        echo "CSV: [$CSV_URL]"
        echo "TIME: [$PITCH_TIME]"
        echo "======================================"

        if [ -z "$PITCH_TIME" ]; then
          PITCH_TIME="50.0"
        fi
        echo "PITCH_TIME=$PITCH_TIME" >> $GITHUB_ENV

        if [ -z "$VIDEO_URL" ] || [ -z "$CSV_URL" ]; then
          echo "エラー: 動画URLまたはCSVのURLが正常に読み込めませんでした。"
          exit 1
        fi

        # ダウンロード開始
        curl -L -o rapsodo_data.csv "$CSV_URL"

        if [[ "$VIDEO_URL" == *"youtube.com"* || "$VIDEO_URL" == *"youtu.be"* ]]; then
          echo "YouTubeから動画を安全にダウンロード中..."
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "$VIDEO_URL" -o "input_video.mp4" --merge-output-format mp4
        else
          echo "ギガファイル便などの外部URLからダウンロード中..."
          curl -H "User-Agent: Mozilla/5.0" -L -o input_video.mp4 "$VIDEO_URL"
        fi

    - name: Run Python Script
      run: |
        python auto_cutter.py --video "input_video.mp4" --csv "rapsodo_data.csv" --time "$PITCH_TIME"

    - name: Upload Finished Video
      uses: actions/upload-artifact@v4
      with:
        name: finished-pitching-video
        path: highlight_output.mp4
