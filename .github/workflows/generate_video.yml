name: Auto Video Generation

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies and yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy moviepy pillow requests
        sudo apt-get update && sudo apt-get install -y ffmpeg
        pip install yt-dlp

    - name: Parse Issue Inputs and Download Files
      id: parse_args
      run: |
        # エスケープによるバグを防ぐため、環境変数経由でIssue本文を安全に取得
        BODY=$(cat << 'EOF'
        ${{ github.event.issue.body }}
        EOF
        )
        
        # 1. CSVのURLを確実に抽出
        CSV_URL=$(echo "$BODY" | grep -oE 'https://github.com/[^ \n)]+\.csv' | head -n 1)
        
        # 2. 動画のURLを抽出 (YouTube, ギガファイル便, Googleドライブ, GitHub添付すべてに対応)
        # httpまたはhttpsから始まり、改行やスペース、閉じカッコの手前までを全自動で引っ掛けます
        VIDEO_URL=$(echo "$BODY" | grep -oE 'https?://[^ \n)]+' | grep -v '\.csv' | head -n 1)
        
        # 3. 秒数を抽出
        PITCH_TIME=$(echo "$BODY" | grep -A 1 '初球の秒数' | tail -n 1 | grep -oE '[0-9]+(\.[0-9]+)?' | head -n 1)

        echo "=== 抽出結果（バグ修正版） ==="
        echo "VIDEO: [$VIDEO_URL]"
        echo "CSV: [$CSV_URL]"
        echo "TIME: [$PITCH_TIME]"
        echo "=============================="

        if [ -z "$PITCH_TIME" ]; then
          PITCH_TIME="50.0"
        fi
        echo "PITCH_TIME=$PITCH_TIME" >> $GITHUB_ENV

        # ファイルのダウンロード処理
        curl -L -o rapsodo_data.csv "$CSV_URL"

        if [[ "$VIDEO_URL" == *"youtube.com"* || "$VIDEO_URL" == *"youtu.be"* ]]; then
          echo "YouTubeから動画をダウンロードしています..."
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "$VIDEO_URL" -o "input_video.mp4" --merge-output-format mp4
        elif [ -n "$VIDEO_URL" ]; then
          echo "外部URL（ギガファイル便等）から動画を直接ダウンロードしています..."
          # ギガファイル便などのサーバーにロボットだとバレないようにブラウザのふりをしてダウンロードします
          curl -H "User-Agent: Mozilla/5.0" -L -o input_video.mp4 "$VIDEO_URL"
        else
          echo "エラー: 動画のURLが正しく認識されませんでした。"
          exit 1
        fi

    - name: Run Python Script
      run: |
        python auto_cutter.py --video "input_video.mp4" --csv "rapsodo_data.csv" --time "$PITCH_TIME"

    - name: Upload Finished Video
      uses: actions/upload-artifact@v4
      with:
        name: finished-pitching-video
        path: highlight_output.mp4
