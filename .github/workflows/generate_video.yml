name: Auto Video Generation

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies and yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy moviepy pillow requests
        # YouTubeから動画を高画質で引き抜くためのツールをインストール
        sudo map_repo_silent=1 apt-get update && sudo apt-get install -y ffmpeg
        pip install yt-dlp

    - name: Parse Issue Inputs and Download Files
      id: parse_args
      run: |
        # フォームから入力を取得
        VIDEO_INPUT=$(echo '${{ github.event.issue.body }}' | grep -A 1 '動画ファイル' | tail -n 1 | xargs)
        CSV_URL=$(echo '${{ github.event.issue.body }}' | grep -oE 'https://github.com/[^)]+\.csv' | head -n 1)
        PITCH_TIME=$(echo '${{ github.event.issue.body }}' | grep -A 1 '初球の秒数' | tail -n 1 | xargs)

        echo "PITCH_TIME=$PITCH_TIME" >> $GITHUB_ENV

        # CSVのダウンロード
        curl -L -o rapsodo_data.csv "$CSV_URL"

        # 動画の処理：YouTubeリンクかそれ以外かで分岐
        if [[ "$VIDEO_INPUT" == *"youtube.com"* || "$VIDEO_INPUT" == *"youtu.be"* ]]; then
          echo "YouTube動画をダウンロード中..."
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "$VIDEO_INPUT" -o "input_video.mp4" --merge-output-format mp4
        else
          echo "通常のURLからダウンロード中..."
          curl -L -o input_video.mp4 "$VIDEO_INPUT"
        fi

    - name: Run Python Script
      run: |
        python auto_cutter.py --video "input_video.mp4" --csv "rapsodo_data.csv" --time "$PITCH_TIME"

    - name: Upload Finished Video
      uses: actions/upload-artifact@v4
      with:
        name: finished-pitching-video
        path: highlight_output.mp4
