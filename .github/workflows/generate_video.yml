name: Auto Video Generation

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest  # ← 「if:」の行を消して、直接「runs-on」から始まるようにします
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy moviepy pillow requests

    - name: Parse Issue Inputs and Download Files
      id: parse_args
      run: |
        # フォームから添付ファイルのURLを抽出
        VIDEO_URL=$(echo '${{ github.event.issue.body }}' | grep -oE 'https://github.com/[^)]+\.(mp4|mov|avi)' | head -n 1)
        CSV_URL=$(echo '${{ github.event.issue.body }}' | grep -oE 'https://github.com/[^)]+\.csv' | head -n 1)
        PITCH_TIME=$(echo '${{ github.event.issue.body }}' | grep -A 1 '初球の秒数' | tail -n 1 | xargs)

        echo "PITCH_TIME=$PITCH_TIME" >> $GITHUB_ENV

        # ファイルのダウンロード
        curl -L -o input_video.mp4 "$VIDEO_URL"
        curl -L -o rapsodo_data.csv "$CSV_URL"

    - name: Run Python Script
      run: |
        python auto_cutter.py --video "input_video.mp4" --csv "rapsodo_data.csv" --time "$PITCH_TIME"

    - name: Upload Finished Video
      uses: actions/upload-artifact@v4
      with:
        name: finished-pitching-video
        path: highlight_output.mp4
