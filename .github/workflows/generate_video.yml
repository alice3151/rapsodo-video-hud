name: Auto Video Generation

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies and yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy moviepy pillow requests
        sudo apt-get update && sudo apt-get install -y ffmpeg
        pip install yt-dlp

    - name: Force Download Files
      run: |
        # エラーが起きる文字抽出を完全に廃止し、今回のURLを直接指定します
        VIDEO_URL="https://91.download.gigafile.nu/0713-g103bf5d8268c22fc3ba1b894b9ad8cd2"
        CSV_URL="https://github.com/alice3151/rapsodo-video-hud/user-attachments/files/29784548/1.BT.Rapsodo.-.csv"
        PITCH_TIME="50.0"

        echo "PITCH_TIME=$PITCH_TIME" >> $GITHUB_ENV

        echo "CSVデータをダウンロード中..."
        curl -L -o rapsodo_data.csv "$CSV_URL"

        echo "ギガファイル便から1.22GBの動画を直接ダウンロード中（数分かかります）..."
        curl -H "User-Agent: Mozilla/5.0" -L -o input_video.mp4 "$VIDEO_URL"

    - name: Run Python Script
      run: |
        python auto_cutter.py --video "input_video.mp4" --csv "rapsodo_data.csv" --time "$PITCH_TIME"

    - name: Upload Finished Video
      uses: actions/upload-artifact@v4
      with:
        name: finished-pitching-video
        path: highlight_output.mp4
